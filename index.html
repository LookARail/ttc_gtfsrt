<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>LOOKARAIL GTFS-RT</title>

<!-- Leaflet CSS -->
<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
  crossorigin=""
/>

<!-- Custom styles -->
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="map"></div>
  <div id="status" class="status-bar">
    <span class="status-dot" aria-hidden="true"></span>
    <span id="statusText">Initializing…</span>
  </div>
  <div id="vehicleCount" class="vehicle-count">— vehicles active</div>
  
  <!-- Toggle button for RT Data Recorder -->
  <button id="toggleRecorderBtn" class="toggle-recorder-btn" title="Toggle RT Data Recorder">📊 RT Recorder</button>
  
  <!-- View recorded data button -->
  <button id="viewRecordingsBtn" class="view-recordings-btn" title="View Recorded Data">📈 View Recordings</button>

  <!-- Filter panel -->
  <div id="filterPanel">
    <div class="filter-title">Trip Filters:</div>
    <div class="filter-section">
      <div class="filter-row">
        <label for="filterRouteType">Route Type:</label>
        <button class="filter-select-all" id="selectAllRouteType">Select All</button>
      </div>
      <select multiple id="filterRouteType" class="filter-select" size="5"></select>
    </div>
    <div class="filter-section">
      <div class="filter-row">
        <label for="filterRouteName">Route Name:</label>
        <button class="filter-select-all" id="selectAllRouteName">Select All</button>
      </div>
      <select multiple id="filterRouteName" class="filter-select" size="7"></select>
    </div>
    <button class="filter-apply" id="applyFilterBtn">Apply Filter</button>
  </div>

  <!-- RT Data Recorder Panel -->
  <div id="recorderPanel" class="hidden">
    <button id="closeRecorderBtn" class="close-recorder-btn" title="Close">✕</button>
    <div class="recorder-title">RT Data Recorder</div>
    <div class="recorder-controls">
      <button class="recorder-btn" id="startRecordBtn">Start Collecting Trip Data</button>
      <button class="recorder-btn" id="stopRecordBtn" disabled>Stop</button>
      <button class="recorder-btn" id="downloadRecordBtn">Download Data</button>
    </div>
    <div class="recorder-status" id="recorderStatus">Not collecting</div>
    <div class="recorder-content">
      <div class="recorder-list">
        <div class="recorder-list-title">Trips Being Tracked:</div>
        <div id="tripList" class="trip-list"></div>
      </div>
      <div class="recorder-details">
        <div class="recorder-details-title">Trip Details:</div>
        <div id="tripDetails" class="trip-details">Select a trip to view details</div>
      </div>
    </div>
  </div>

  <!-- Leaflet JS -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <!-- Load runtime config then application scripts -->
  <script>
    (async function() {
      try {
        const resp = await fetch('config.json');
        if (resp.ok) window.APP_CONFIG = await resp.json();
        else window.APP_CONFIG = {};
      } catch (e) {
        console.error('Failed to load config.json', e);
        window.APP_CONFIG = {};
      }

      const apps = ['RTrecordingViewer.js', 'main.js', 'Debug.js'];
      for (const src of apps) {
        await new Promise(resolve => {
          const s = document.createElement('script');
          s.src = src;
          s.onload = () => resolve();
          s.onerror = () => { console.error('Failed to load', src); resolve(); };
          document.body.appendChild(s);
        });
      }
    })();
  </script>
</body>
</html>
