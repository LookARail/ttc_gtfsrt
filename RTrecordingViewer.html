<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>RT Recording Viewer</title>
  <link rel="stylesheet" href="RTrecordingViewer.css">
</head>
<body>
  <div class="header">
    <h1>RT Recording Viewer</h1>
    <div id="statusBadge"></div>
  </div>
  
  <div class="viewer-container">
    <!-- Left Panel: 30% -->
    <div class="left-panel">
      <div class="data-source-section">
        <h3>Data Source</h3>
        <div class="form-group">
          <label for="dataSource">Source:</label>
          <select id="dataSource">
            <option value="">-- Select source --</option>
            <option value="memory">Current Recording</option>
            <option value="github">Load from GitHub</option>
            <option value="file">Upload JSON File</option>
          </select>
        </div>
        
        <div id="githubDateSelect" style="display:none;" class="form-group">
          <label for="githubDate">Select Date:</label>
          <select id="githubDate">
            <option value="">-- Loading... --</option>
          </select>
          <div class="date-annotation">
            Note: "2026-03-09.json" contains data from March 8 (completed at 3 AM Toronto time).
          </div>
        </div>
        
        <div id="fileUpload" style="display:none;" class="form-group">
          <label for="fileInput">Select File:</label>
          <input type="file" id="fileInput" accept=".json">
        </div>
        
        <button id="loadDataBtn" class="primary-btn" disabled>Load Data</button>
        <div id="loadError" class="error" style="display:none;"></div>
      </div>
      
      <div id="filterSection" class="filter-section" style="display:none;">
        <h3>Route Filter</h3>
        <div class="route-filter" id="routeFilter"></div>
        <div class="filter-controls">
          <button id="selectAllRoutes" class="small-btn">Select All</button>
          <button id="deselectAllRoutes" class="small-btn">Deselect All</button>
          <button id="applyFilter" class="primary-btn">Apply Filter</button>
        </div>
      </div>
    </div>
    
    <!-- Right Panel: 70% -->
    <div class="right-panel">
      <div id="loadingIndicator" class="loading">
        Processing data...
      </div>
      
      <div id="viewerContent" style="display:none;">
        <div class="tabs">
          <button class="tab active" data-tab="otp">On-Time Performance</button>
        </div>
        
        <div class="charts-container">
          <div id="otpTab" class="tab-content active">
            <div class="chart-wrapper">
              <div class="chart-title">Top 10 Routes by Average Delay</div>
              <canvas id="routeChart"></canvas>
            </div>
            
            <div class="chart-wrapper">
              <div class="chart-title">Top 20 Stops by Average Delay</div>
              <canvas id="stopChart"></canvas>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <!-- Load Chart.js statically (local or CDN fallback) -->
  <script src="libs/chart.js" onerror="this.onerror=null; this.src='https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.min.js';"></script>
  
  <!-- Main viewer script -->
  <script src="RTrecordingViewer.js"></script>
</body>
</html>
